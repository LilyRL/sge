toml = "1.0.6"
walkdir = "2.5.0"
rkyv = "0.8.15"
slotmap = "1.1.1"
rodio = { version = "0.22.2", features = ["noise", "playback"] }
prettyplease = "0.2"
gilrs = "0.11.1"
glob = "0.3.3"
crossbeam-channel = "0.5.15"
const-random = "0.1.18"
dyn-clone = "1.0.20"

[dependencies]
anyhow = { workspace = true }
sge_vectors = { workspace = true }
bon = { workspace = true }
bumpalo = { workspace = true }
color-eyre = { workspace = true }
const-random = "0.1.18"
egui_glium = { workspace = true }
env_logger = { workspace = true }
sge_error_union = { workspace = true }
fontdue = { workspace = true }
fps_ticker = { workspace = true }
glium = { workspace = true }
glutin-winit = { workspace = true }
glyph_brush = { workspace = true }
image = { workspace = true }
log = { workspace = true }
nalgebra = { workspace = true }
obj-rs = { workspace = true }
palette = { workspace = true }
paste = { workspace = true }
phf = { workspace = true }
rand = { workspace = true }
rapier2d = { workspace = true }
rayon = { workspace = true }
sge_color = { workspace = true }
sge_macros = { workspace = true }
sge_input = { workspace = true, optional = true }
sge_si = { workspace = true }
termcolor = { workspace = true }
thiserror = { workspace = true }
trig-const = { workspace = true }
sge_math = { workspace = true }
sge_shapes = { workspace = true }
rkyv = { workspace = true }
sge_window = { workspace = true }
sge_config = { workspace = true }
sge_logging = { workspace = true }
sge_camera = { workspace = true }
sge_egui = { workspace = true, optional = true }
sge_debugging = { workspace = true, optional = true }
sge_programs = { workspace = true }
sge_textures = { workspace = true }
sge_rendering = { workspace = true }
sge_rng = { workspace = true }
sge_time = { workspace = true }
sge_audio = {workspace = true ,optional = true}
sge_global = { workspace = true }
sge_ui = { workspace = true, optional = true }
sge_animation = { workspace = true }
sge_debug_visualisations = { workspace = true, optional = true }
sge_types = { workspace = true }
sge_api = { workspace = true }
sge_image = { workspace = true }
sge_physics = { workspace = true }
sge_text = { workspace = true, optional = true }
sge_texture_atlas = { workspace = true }
sge_utils = { workspace = true }
sge_particles = { workspace = true }
sge_include_assets = { workspace = true }
sge_persistence = { workspace = true }
sge_graph_networks = { workspace = true }
sge_routines = { workspace = true }
sge_camera_controllers.workspace = true

[profile.release]
# Compile the entire crate as one unit.
# Slows compile times, marginal improvements.
codegen-units = 1
# Do a second optimization pass over the entire program, including dependencies.
# Slows compile times, marginal improvements.
lto = "thin"

[toolchain]
channel = "nightly"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=/usr/bin/mold",
  # (Nightly) Make the current crate share its generic instantiations
  "-Zshare-generics=y",
]

[unstable]
codegen-backend = true

[features]
default = [
    "precise_cursor_movement",
    "audio",
    "input",
    "gamepad",
    "text",
    "extra_fonts",
    "debug_visualisations",
    "ui",
    "debugging",
    "egui"
]
precise_cursor_movement = ["sge_input/precise_cursor_movement"]
audio = ["dep:sge_audio"]
input = ["dep:sge_input"]
gamepad = ["input", "sge_input/gamepad"]
text = ["dep:sge_text"]
extra_fonts = ["text", "sge_text/extra_fonts"]
ui = ["extra_fonts", "dep:sge_ui"]
egui = ["dep:sge_egui"]
debugging = ["dep:sge_debugging"]
debug_visualisations = ["debugging", "egui", "dep:sge_debug_visualisations"]

[workspace]
members = [
    ".",
    "crates/sge_error_union",
    "crates/sge_color",
    "crates/sge_macros",
    "crates/sge_si",
    "crates/sge_math",
    "crates/sge_types",
    "crates/sge_shapes",
    "crates/sge_logging",
    "crates/sge_shapes",
    "crates/sge_camera",
    "crates/sge_global",
    "crates/sge_input",
