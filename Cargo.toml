bumpalo = { version = "3.19.0", features = ["collections"] }
color-eyre = "0.6.5"
egui_glium = "0.31.1"
env_logger = "0.11.8"
fontdue = "0.9.3"
fps_ticker = "1.0.0"
glium = "0.36.0"
glutin-winit = "0.5.0"
winit = "0.30"
glyph_brush = "0.7.12"
image = "0.25.8"
log = "0.4.28"
lyon = "1.0.16"
nalgebra = { version = "0.34.1", features = ["convert-glam030"] }
obj-rs = "0.7.4"
palette = "0.7.6"
paste = "1.0.15"
phf = { version = "0.11", features = ["macros"] }
rand = "0.9.2"
rapier2d = { version = "0.30.1", features = ["simd-stable"] }
rayon = "1.11.0"
sge_color = { path = "./crates/sge_color", version = "0.1.0" }
sge_macros = { path = "./crates/sge_macros", version = "0.1.0" }
sge_math = { path = "./crates/sge_math", version = "0.1.0" }
