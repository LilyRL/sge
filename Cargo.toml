    "crates/sge_textures",
    "crates/sge_rendering",
    "crates/sge_programs",
    "crates/sge_utils",
    "crates/sge_image",
    "crates/sge_config",
    "crates/sge_api",
    "crates/sge_text",
    "crates/sge_debugging",
    "crates/sge_debug_visualisations",
    "crates/sge_rng",
    "crates/sge_time",
    "crates/sge_texture_atlas",
    "crates/sge_animation",
    "crates/sge_audio",
    "crates/sge_ui",
    "crates/sge_egui",
    "crates/sge_physics",
    "crates/sge_particles",
    "crates/sge_include_assets",
    "crates/sge_vectors",
    "crates/sge_persistence",
    "crates/sge_async",
    "crates/sge_graph_networks",
    "crates/sge_routines",
    "crates/sge_feature_gated",
    "crates/sge_camera_controllers"
]
resolver = "3"
