cargo-features = ["codegen-backend"]

[package]
name = "engine_4"
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
bevy_math = "0.17.2"
bumpalo = { version = "3.19.0", features = ["collections"] }
color-eyre = "0.6.5"
egui_glium = "0.31.1"
env_logger = "0.11.8"
fontdue = "0.9.3"
fps_ticker = "1.0.0"
glium = "0.36.0"
glyph_brush = "0.7.12"
image = "0.25.8"
include_folder = "0.3.0"
log = "0.4.28"
lyon = "1.0.16"
nalgebra = { version = "0.34.1", features = ["convert-glam030"] }
obj-rs = "0.7.4"
palette = "0.7.6"
paste = "1.0.15"
rand = "0.9.2"
rapier2d = { version = "0.30.1", features = ["simd-stable"] }
tunes = { version = "1.0.2", features = ["gpu"] }
engine_4_macros = { path = "./crates/engine_4_macros" }
rayon = "1.11.0"
glutin-winit = "0.5.0"
trig-const = "0.3.0"
phf = { version = "0.11", features = ["macros"] }
thiserror = "2.0.17"
termcolor = "1.4.1"
bon = "3.8.1"
anyhow = "1.0.100"
error_union = { path = "./crates/error_union" }
engine_color = { path = "./crates/color" }
si = { path = "./crates/si" }

[dependencies]
si = { workspace = true }
gilrs_input_helper = { path = "./crates/gilrs_input_helper", optional = true }
pprof = { version = "0.15.0", features = ["flamegraph"], optional = true }
egui_plot = {version = "0.31", optional = true}
winit_input_helper = { path = "./crates/winit_input_helper" }
bevy_math = { workspace = true }
bumpalo = { workspace = true }
color-eyre = { workspace = true }
egui_glium = { workspace = true }
env_logger = { workspace = true }
fontdue = { workspace = true }
fps_ticker = { workspace = true }
glium = { workspace = true }
glyph_brush = { workspace = true }
image = { workspace = true }
include_folder = { workspace = true }
log = { workspace = true }
lyon = { workspace = true }
nalgebra = { workspace = true }
obj-rs = { workspace = true }
palette = { workspace = true }
paste = { workspace = true }
rand = { workspace = true }
rapier2d = { workspace = true }
tunes = { workspace = true }
engine_4_macros = { workspace = true }
rayon = { workspace = true }
glutin-winit = { workspace = true }
trig-const = { workspace = true }
phf = { workspace = true }
thiserror = { workspace = true }
termcolor = { workspace = true }
bon = { workspace = true }
anyhow = { workspace = true }
error_union = { workspace = true }
engine_color = { workspace = true }
const-random = "0.1.18"

[profile.dev]
opt-level = 1
codegen-backend = "cranelift"

[profile.dev.package."*"]
opt-level = 3
codegen-backend = "llvm"

[profile.release]
# Compile the entire crate as one unit.
# Slows compile times, marginal improvements.
codegen-units = 1
# Do a second optimization pass over the entire program, including dependencies.
# Slows compile times, marginal improvements.
lto = "thin"

[toolchain]
channel = "nightly"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=/usr/bin/mold",
  # (Nightly) Make the current crate share its generic instantiations
  "-Zshare-generics=y",
]

[unstable]
codegen-backend = true

[features]
default = ["debugging", "gamepad"]
debugging = ["dep:egui_plot"]
gamepad = ["dep:gilrs_input_helper"]
precise_cursor_movement = ["winit_input_helper/precise_cursor_movement"]
profile = ["dep:pprof"]

[workspace]
members = [
    ".",
    "crates/error_union",
    "examples/perf_test",
    "crates/color",
    "crates/engine_4_macros",
    "crates/gilrs_input_helper",
    "crates/include_folder",
    "crates/si",
    "crates/winit_input_helper"
 ]
resolver = "3"
